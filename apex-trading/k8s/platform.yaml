apiVersion: v1
kind: ServiceAccount
metadata:
  name: trading-sa
  namespace: apex
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::441923857612:role/apex-trading-admin-role
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: compliance-sa
  namespace: apex
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::441923857612:role/apex-compliance-readonly-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apex-trading-service
  namespace: apex
  labels:
    app: apex-trading-service
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: apex-trading-service
  template:
    metadata:
      labels:
        app: apex-trading-service
    spec:
      serviceAccountName: trading-sa
      containers:
        - name: apex-trading
          image: apex/trading-service:2.1.0
          ports:
            - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apex-payments-service
  namespace: apex
  labels:
    app: apex-payments-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: apex-payments-service
  template:
    metadata:
      labels:
        app: apex-payments-service
    spec:
      containers:
        - name: apex-payments
          image: apex/payments-service:3.0.0
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: apex-trading-svc
  namespace: apex
spec:
  selector:
    app: apex-trading-service
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: apex-payments-svc
  namespace: apex
spec:
  selector:
    app: apex-payments-service
  ports:
    - port: 80
      targetPort: 3000
---
# apex-compliance is NOT exposed via Ingress — internal only
# This is critical: generateReport has Log4Shell but is not internet-reachable
# The system should score it HIGH (not CRITICAL) because D6=internal
apiVersion: v1
kind: Service
metadata:
  name: apex-compliance-svc
  namespace: apex
spec:
  selector:
    app: apex-compliance-service
  ports:
    - port: 80
      targetPort: 8081
  # No Ingress route to this service — internal only
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apex-api-ingress
  namespace: apex
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
    - host: api.apex-financial.example.com
      http:
        paths:
          - path: /api/trading
            pathType: Prefix
            backend:
              service:
                name: apex-trading-svc
                port:
                  number: 80
          - path: /api/payments
            pathType: Prefix
            backend:
              service:
                name: apex-payments-svc
                port:
                  number: 80
          # NOTE: /api/compliance is NOT routed — apex-compliance is internal only
