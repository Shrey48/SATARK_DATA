AWSTemplateFormatVersion: "2010-09-09"
Description: Apex Commerce auxiliary infrastructure

Resources:
  PaymentQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: apex-payment-queue-prod
      VisibilityTimeout: 60

  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: apex-notifications-prod

  PaymentQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref PaymentQueue
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt PaymentQueue.Arn
