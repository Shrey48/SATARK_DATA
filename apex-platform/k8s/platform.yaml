apiVersion: v1
kind: ServiceAccount
metadata:
  name: payments-service-sa
  namespace: apex
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::441923857612:role/apex-payments-lambda-role
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: inventory-service-sa
  namespace: apex
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::441923857612:role/apex-inventory-lambda-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-service
  namespace: apex
  labels:
    app: payments-service
    tier: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: payments-service
  template:
    metadata:
      labels:
        app: payments-service
        tier: backend
    spec:
      serviceAccountName: payments-service-sa
      containers:
        - name: payments-service
          image: apex/payments-service:4.2.1
          ports:
            - containerPort: 8080
          env:
            - name: INVENTORY_TABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: apex-secrets
                  key: inventory-table
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: apex
  labels:
    app: inventory-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
        tier: backend
    spec:
      serviceAccountName: inventory-service-sa
      containers:
        - name: inventory-service
          image: apex/inventory-service:3.0.5
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: payments-service-svc
  namespace: apex
spec:
  selector:
    app: payments-service
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service-svc
  namespace: apex
spec:
  selector:
    app: inventory-service
  ports:
    - port: 80
      targetPort: 8081
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apex-api-ingress
  namespace: apex
spec:
  rules:
    - host: api.apex-commerce.example.com
      http:
        paths:
          - path: /payments
            pathType: Prefix
            backend:
              service:
                name: payments-service-svc
                port:
                  number: 80
          - path: /inventory
            pathType: Prefix
            backend:
              service:
                name: inventory-service-svc
                port:
                  number: 80
